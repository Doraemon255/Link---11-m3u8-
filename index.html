<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BLEEDBLUEARMY🇮🇳 MPD Player</title>

<!-- Shaka Player -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.11/shaka-player.ui.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.11/controls.min.css">

<style>
html, body {
  margin: 0;
  padding: 0;
  background: black;
  width: 100%;
  height: 100%;
}

#player-container {
  width: 100vw;
  height: 100vh;
}

video {
  width: 100%;
  height: 100%;
  background: black;
}
</style>
</head>

<body>

<div id="player-container" data-shaka-player-container>
  <video id="video" autoplay muted playsinline></video>
</div>

<script>
async function initPlayer() {

  // Install polyfills
  shaka.polyfill.installAll();

  // Check browser support
  if (!shaka.Player.isBrowserSupported()) {
    alert("Browser not supported");
    return;
  }

  const video = document.getElementById("video");
  const container = document.getElementById("player-container");

  // Create player & UI
  const player = new shaka.Player(video);
  const ui = new shaka.ui.Overlay(player, container, video);

  // ClearKey DRM configuration
  player.configure({
    drm: {
      clearKeys: {
        "baafdb8ebcbbc0655332291da6f121da":
        "60ac892e0ea0b2c46fc6837c97ed641a"
      }
    }
  });

  // UI controls
  ui.configure({
    controlPanelElements: [
      "play_pause",
      "mute",
      "volume",
      "time_and_duration",
      "quality",
      "fullscreen"
    ]
  });

  try {
    await player.load(
      "https://live-pv-ta.amazon.fastly-edge.com/lhr-nitro/live/clients/dash/enc/wwrmho82pc/out/v1/d7130f460d41486ea7e8e3eb45f0522f/cenc.mpd"
    );
    console.log("MPD loaded");
    video.play().catch(()=>{});
  } catch (error) {
    console.error("Playback error:", error);
    alert("MPD loaded but segments are blocked (CDN restriction)");
  }
}

// Start player
document.addEventListener("DOMContentLoaded", initPlayer);
</script>

</body>
</html>
