<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>DASH ClearKey Player</title>

    <!-- Dash.js CDN -->
    <script src="https://cdn.dashjs.org/latest/dash.all.min.js"></script>

    <style>
        body {
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        video {
            width: 90%;
            max-width: 900px;
            outline: none;
        }
    </style>
</head>
<body>

<video id="videoPlayer" controls autoplay></video>

<script>
    const video = document.getElementById("videoPlayer");
    const player = dashjs.MediaPlayer().create();

    player.initialize(video, 
        "https://a201aivottlinear-a.akamaihd.net/OTTB/pdx-nitro/live/clients/dash/enc/rxhxc14ikz/out/v1/bb976c39247941f3b4c9fa0a0735426d/cenc.mpd", 
        true
    );

    player.setProtectionData({
        "org.w3.clearkey": {
            "clearkeys": {
                "2904b17cb64c996dbc254981b7602863": "66a7ef671b84498e64f94e8401fe8cb9"
            }
        }
    });
</script>

</body>
</html>
