<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Working ClearKey Test</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.10/shaka-player.compiled.js"></script>
<style>
body { margin:0; background:black; }
video { width:100vw; height:100vh; }
</style>
</head>
<body>

<video id="v" controls autoplay></video>

<script>
(async () => {
  const video = document.getElementById("v");
  const player = new shaka.Player(video);

  player.configure({
    drm: {
      clearKeys: {
        "1ae8ccd0e2b240c3b8d9c9b6a1b6b8c2": "3d5e6f7a8b9c0d1e2f3a4b5c6d7e8f90"
      }
    }
  });

  await player.load(
    "https://storage.googleapis.com/shaka-demo-assets/angel-one-clearkey/dash.mpd"
  );
})();
</script>

</body>
</html>
