<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0" />
    <title>BLEEDBLUEARMY</title>

    <style>
      body {
        margin: 0;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: #03141d;
        display: flex;
        justify-content: center;
        padding: 12px;
      }
      .container {
        width: 100%;
        max-width: 600px;
        display: flex;
        flex-direction: column;
        gap: 15px;
      }
      .card {
        background: linear-gradient(135deg, #0d6efd, #1a0ebd);
        border-radius: 14px;
        padding: 18px;
        color: #fff;
        text-align: center;
        box-shadow: 0 6px 18px rgba(0, 0, 0, 0.15);
      }
      .header {
        font-size: 22px;
        font-weight: 700;
      }
      .video-wrapper {
        background: #000;
        border-radius: 14px;
        overflow: hidden;
        position: relative;
        padding-top: 56.25%;
        box-shadow: 0 0 0 8px #0d6efd;
        margin-bottom: 15px;
        margin-top: 15px;
      }
      .video-wrapper iframe {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        border: 0;
      }
      .error-box {
        display: none;
        background: #ff4d4d;
        color: #fff;
        text-align: center;
        padding: 10px;
        border-radius: 10px;
        font-weight: 500;
      }
      .community h3 {
        margin: 0 0 14px;
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        font-size: 16px;
        font-weight: 600;
      }
      .buttons {
        display: flex;
        gap: 12px;
        justify-content: center;
      }
      .btn {
        flex: 1;
        background: transparent;
        border: 2px solid #fff;
        border-radius: 30px;
        padding: 10px;
        color: #fff;
        font-weight: 600;
        text-decoration: none;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        transition: 0.3s;
      }
      .btn:hover {
        background: #fff;
        color: #0d6efd;
      }
      .btn svg {
        width: 18px;
        height: 18px;
        fill: currentColor;
      }
      .share-btn {
        background: transparent;
        color: #fff;
        border: 2px solid #fff;
        border-radius: 30px;
        padding: 10px;
        font-weight: 600;
        cursor: pointer;
        width: 100%;
        transition: 0.3s;
        font-size: 14px;
      }

      .share-btn:hover {
        background: #fff;
        color: #0d6efd;
      }
      .combined-sections {
        display: flex;
        gap: 15px;
        flex-wrap: wrap;
      }
      .combined-sections .card {
        flex: 1;
        min-width: 250px;
      }
      .photo-section {
        display: flex;
        justify-content: center;
        align-items: stretch;
        width: 100%;
        margin-top: 15px;
      }
      .photo-item {
        width: 100%;
        height: 250px;
        border-radius: 14px;
        overflow: hidden;
        box-shadow: 0 6px 18px rgba(0, 0, 0, 0.15);
        transition: transform 0.3s;
        display: block;
      }
      .photo-item:hover {
        transform: scale(1.05);
      }
      .photo-item img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
      }
      .photo-item a {
        display: block;
        width: 100%;
        height: 100%;
      }

      /* Responsive Design */
      @media (max-width: 768px) {
        .container {
          max-width: 100%;
          gap: 12px;
        }

        .card {
          padding: 16px;
        }

        .header {
          font-size: 20px;
        }

        .combined-sections {
          flex-direction: column;
          gap: 12px;
        }

        .combined-sections .card {
          flex: 1;
          min-width: unset;
        }

        .photo-item {
          width: 100%;
          height: 200px;
          border-radius: 12px;
        }

        .photo-section {
          margin-top: 12px;
        }

        .community h3 {
          font-size: 16px;
          margin: 0 0 12px;
        }

        body {
          padding: 8px;
        }
      }

      @media (max-width: 480px) {
        .container {
          max-width: 100%;
          gap: 10px;
        }

        .card {
          padding: 14px;
          border-radius: 10px;
        }

        .header {
          font-size: 18px;
        }

        .community h3 {
          font-size: 14px;
          gap: 6px;
          margin: 0 0 10px;
        }

        .buttons {
          gap: 8px;
          flex-wrap: wrap;
        }

        .btn {
          padding: 8px;
          font-size: 12px;
          border-radius: 25px;
        }

        .btn svg {
          width: 16px;
          height: 16px;
        }

        .share-btn {
          padding: 8px;
          font-size: 12px;
          border-radius: 25px;
        }

        .video-wrapper {
          margin-bottom: 20px;
          box-shadow: 0 0 0 4px #0d6efd;
          border-radius: 10px;
        }

        .photo-item {
          width: 100%;
          height: 180px;
          border-radius: 10px;
        }

        .photo-section {
          margin-top: 10px;
        }

        body {
          padding: 6px;
        }
      }

      @media (max-width: 360px) {
        .container {
          gap: 8px;
        }

        .card {
          padding: 12px;
          border-radius: 8px;
        }

        .header {
          font-size: 16px;
        }

        .community h3 {
          font-size: 13px;
          margin: 0 0 8px;
        }

        .btn {
          padding: 6px;
          font-size: 11px;
        }

        .share-btn {
          padding: 6px;
          font-size: 11px;
          border-radius: 20px;
        }

        .photo-item {
          width: 100%;
          height: 150px;
        }

        .video-wrapper {
          margin-bottom: 15px;
        }
      }
    </style>
  </head>

  <body>
    <div class="container">
      <div class="card header">BLEEDBLUEARMY</div>

      <div class="video-wrapper">
        <div id="player-container"></div>
      </div>

      <div
        id="errorBox"
        class="error-box">
        Invalid or unavailable stream ID.
      </div>

      <div class="combined-sections">
        <div class="card community">
          <h3>Join our community for live updates!</h3>

          <div class="buttons">
            <a
              href="https://t.me/+_WN9XxoZT8QxZmI1"
              class="btn">
              <svg viewBox="0 0 24 24">
                <path
                  d="M9.04 15.47l-.4 5.65c.57 0 .82-.25 1.13-.55l2.72-2.6 5.64 4.13c1.03.57 1.76.27 2.04-.95l3.7-17.37c.36-1.65-.6-2.3-1.6-1.92L1.66 9.74c-1.58.61-1.55 1.5-.27 1.9l5.58 1.74L19.46 5.6c.58-.36 1.1-.16.67.2"></path>
              </svg>
              Telegram
            </a>
          </div>
        </div>

        <div class="card community">
          <h3>Copy Link & Open In Chrome Browser Only</h3>
          <button
            class="share-btn"
            id="shareBtn">
            Share This Page Link
          </button>
        </div>
      </div>

      <div class="photo-section">
        <a
          href="#"
          class="photo-item"
          id="photoLink">
          <img
            src=""
            alt="Banner Photo"
            id="photoImg" />
        </a>
      </div>
    </div>

    <script>
      document.addEventListener("DOMContentLoaded", function () {
        // DEFAULT POPUP
        if (confirm("Join For More Links")) {
          window.location.href = "https://t.me/+_WN9XxoZT8QxZmI1";
          return;
        }

        // GET ID PARAM
        const params = new URLSearchParams(window.location.search);
        const id = params.get("id");

        const playerContainer = document.getElementById("player-container");
        const errorBox = document.getElementById("errorBox");

        if (!id) {
          errorBox.style.display = "block";
          return;
        }

        // FETCH JSON
        fetch("https://allrounderid2.pages.dev/id.json")
          .then((res) => res.json())
          .then((data) => {
            if (!data.iframes || !Array.isArray(data.iframes)) {
              errorBox.style.display = "block";
              return;
            }

            const match = data.iframes.find((item) => item.id === id);

            if (match && match.iframeSrc) {
              playerContainer.innerHTML = `
        <iframe 
            src="${match.iframeSrc}" 
            allow="encrypted-media; autoplay" 
            allowfullscreen>
        </iframe>
    `;
            } else {
              errorBox.style.display = "block";
            }
          })
          .catch(() => {
            errorBox.style.display = "block";
          });

        document.getElementById("shareBtn").onclick = function () {
          navigator.clipboard
            .writeText(window.location.href)
            .then(() => alert("Link Copied"));
        };
      });
    </script>
  </body>
</html>
