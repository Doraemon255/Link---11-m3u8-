<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BLEEDBLUEARMY🇮🇳</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0f172a;
  color: white;
  text-align: center;
}

header {
  background: #1e3a8a;
  padding: 16px;
  font-size: 22px;
  font-weight: bold;
}

.container {
  max-width: 700px;
  margin: 30px auto;
  padding: 15px;
}

.fake-player {
  background: black;
  border-radius: 16px;
  height: 350px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  border: 2px solid #2563eb;
}

.play-btn {
  width: 80px;
  height: 80px;
  border-radius: 50%;
  background: rgba(0,0,0,0.7);
  border: 3px solid cyan;
  display: flex;
  align-items: center;
  justify-content: center;
}

.play-btn:before {
  content: '';
  margin-left: 6px;
  border-style: solid;
  border-width: 16px 0 16px 28px;
  border-color: transparent transparent transparent cyan;
}

.card {
  margin-top: 25px;
  background: #1e293b;
  padding: 18px;
  border-radius: 14px;
}

.btn {
  display: inline-block;
  margin-top: 10px;
  padding: 12px 22px;
  background: #2563eb;
  color: white;
  text-decoration: none;
  border-radius: 10px;
  font-weight: bold;
}
</style>
</head>

<body>

<header>BLEEDBLUEARMY🇮🇳</header>

<div class="container">

  <div class="fake-player" id="play">
    <div class="play-btn"></div>
  </div>

  <div class="card">
    <h3>Watch Live Match on Telegram</h3>
    <a class="btn" href="https://t.me/+_WN9XxoZT8QxZmI1" target="_blank">
      Join Telegram Channel
    </a>
  </div>

  <div class="card">
    <a class="btn" href="#" id="copy">Copy Page Link</a>
  </div>

</div>

<script>
document.getElementById("play").onclick = function () {
  window.location.href = "https://t.me/+_WN9XxoZT8QxZmI1";
};

document.getElementById("copy").onclick = function (e) {
  e.preventDefault();
  navigator.clipboard.writeText(window.location.href);
  alert("Link copied");
};
</script>

</body>
</html>
