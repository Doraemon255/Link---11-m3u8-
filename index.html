<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BLEEDBLUEARMY🇮🇳 Live</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  background: linear-gradient(135deg, #0a1f3d, #0f172a);
  color: #fff;
  text-align: center;
}

header {
  background: linear-gradient(90deg, #1e3a8a, #2563eb);
  padding: 18px 0;
  font-size: 24px;
  font-weight: bold;
  text-shadow: 0 0 8px rgba(0,255,255,0.5);
}

.container {
  max-width: 900px;
  margin: 30px auto;
  padding: 15px;
}

/* Fake Player */
.player-box {
  position: relative;
  width: 100%;
  height: 500px;
  border-radius: 20px;
  background: black;
  border: 2px solid #2563eb;
  box-shadow: 0 0 25px rgba(0,255,255,0.3);
  overflow: hidden;
  cursor: pointer;
}

.player-box img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  opacity: 0.85;
}

.play-btn {
  position: absolute;
  inset: 0;
  display: flex;
  justify-content: center;
  align-items: center;
}

.play-btn div {
  width: 90px;
  height: 90px;
  background: rgba(0,0,0,0.6);
  border-radius: 50%;
  border: 3px solid #00eaff;
  display: flex;
  justify-content: center;
  align-items: center;
  box-shadow: 0 0 20px rgba(0,255,255,0.7);
}

.play-btn div:before {
  content: '';
  margin-left: 6px;
  border-style: solid;
  border-width: 18px 0 18px 30px;
  border-color: transparent transparent transparent #00eaff;
}

.card {
  background: #1e293b;
  margin-top: 25px;
  padding: 20px;
  border-radius: 15px;
  border: 1px solid #2563eb;
  box-shadow: 0 0 15px rgba(0,128,255,0.2);
}

.btn {
  display: inline-block;
  background: linear-gradient(135deg, #00eaff, #9c00ff);
  color: white;
  text-decoration: none;
  padding: 12px 25px;
  border-radius: 12px;
  font-weight: bold;
  margin-top: 10px;
  transition: all 0.3s ease;
}

.btn:hover {
  background: linear-gradient(135deg, #00ffff, #c000ff);
  box-shadow: 0 0 12px rgba(0,255,255,0.5);
}

.small {
  font-size: 14px;
  color: #cbd5e1;
  margin-top: 8px;
}
</style>
</head>

<body>

<header>BLEEDBLUEARMY🇮🇳</header>

<div class="container">

  <!-- Fake Video Player -->
  <div class="player-box" id="playNow">
    <img src="https://www.disneystar.com/media/2231/7e25132017-009.jpg" alt="Live Match">
    <div class="play-btn">
      <div></div>
    </div>
  </div>

  <!-- Telegram Card -->
  <div class="card">
    <h3>📣 Watch Full Match on Telegram</h3>
    <a href="https://t.me/+_WN9XxoZT8QxZmI1" class="btn" target="_blank">
      Join Telegram Channel
    </a>
    <p class="small">Live streaming & updates available there</p>
  </div>

  <!-- Share Card -->
  <div class="card">
    <h3>🔗 Share This Page</h3>
    <a href="#" class="btn" id="copyLink">Copy Page Link</a>
    <p class="small">Open link in Chrome Browser</p>
  </div>

</div>

<script>
const TELEGRAM_LINK = "https://t.me/+_WN9XxoZT8QxZmI1";

// Redirect on play click
document.getElementById("playNow").addEventListener("click", function () {
  window.location.href = TELEGRAM_LINK;
});

// Copy page link
document.getElementById("copyLink").addEventListener("click", function (e) {
  e.preventDefault();
  navigator.clipboard.writeText(window.location.href);
  alert("Page link copied!");
});
</script>

</body>
</html>
